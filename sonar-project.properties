sonar.projectKey=Insaner1980_KnitTools-website
sonar.organization=insaner1980
sonar.host.url=https://sonarcloud.io

sonar.sources=src,scripts,astro.config.mjs,eslint.config.mjs
sonar.sourceEncoding=UTF-8
sonar.python.version=3.13

# Exclude generated and non-source files from all analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/.astro/**,**/.wrangler/**,**/.sonar/**,**/.scannerwork/**,**/reports/**,**/output/**,src/content/articles/**,**/*.min.js

# Rajaa generoidut tiedostot, sisältö ja lokalisaatiorekisterien data duplikaatioanalyysin ulkopuolelle
sonar.cpd.exclusions=**/node_modules/**,**/dist/**,**/.astro/**,**/.wrangler/**,**/.sonar/**,**/.scannerwork/**,**/reports/**,**/output/**,src/content/articles/**,src/i18n/articles.ts,src/i18n/ui.ts

# Coverage is not collected for static page/content files
sonar.coverage.exclusions=src/pages/**,src/components/**,src/layouts/**,src/content/**,scripts/**
